<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Admin</title>

<link rel="stylesheet" href="css/admin.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

  <div class="logo">🏫</div>

  <button onclick="showSection('dashboard')" class="active">
    <span>📊</span> <p>Dashboard</p>
  </button>

  <button onclick="showSection('admissions')">
    <span>🎓</span> <p>Admissions</p>
  </button>

  <button onclick="showSection('notices')">
    <span>📢</span> <p>Notices</p>
  </button>

  <button onclick="showSection('gallery')">
    <span>🖼️</span> <p>Gallery</p>
  </button>

  <button class="logout" onclick="logout()">
    <span>🚪</span> <p>Logout</p>
  </button>

</div>

<!-- Main -->
<div class="main">

  <!-- Topbar -->
  <div class="topbar">
    <h2>School Dashboard</h2>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="section">
    <div class="cards">

      <div class="card">
        <h3>Total Admissions</h3>
        <p id="totalAdmissions">0</p>
      </div>

      <div class="card">
        <h3>Total Notices</h3>
        <p id="totalNotices">0</p>
      </div>

      <div class="card">
        <h3>Total Images</h3>
        <p id="totalImages">0</p>
      </div>

    </div>
  </div>

  <!-- Admissions -->
  <div id="admissions" class="section hidden">
    <h2>Admissions</h2>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search by name or phone">
      <button onclick="exportExcel()">Export Excel</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>S.No</th>
            <th>Name</th>
            <th>Class</th>
            <th>DOB</th>
            <th>Parent</th>
            <th>Phone</th>
            <th>Email</th>
            <th>School</th>
            <th>Message</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="admissionTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Notices -->
  <div id="notices" class="section hidden">
    <h2>Notices</h2>

    <div class="notice-form">
      <input type="text" id="noticeTitle" placeholder="Enter notice">
      <input type="datetime-local" id="startDate">
      <input type="datetime-local" id="endDate">
      <button onclick="addNotice()">Add</button>
    </div>

    <ul id="noticeList"></ul>
  </div>

  <!-- Gallery -->
  <div id="gallery" class="section hidden">
    <h2>Gallery Upload</h2>

    <form id="uploadForm" class="gallery-form">

      <label>Year</label>
      <select id="yearSelect"></select>
      <input type="text" id="newYear" placeholder="Add new year">

      <label>Category</label>
      <select id="categorySelect"></select>
      <input type="text" id="newCategory" placeholder="Add new category">

      <input type="file" id="image" required>

      <button type="submit">Upload</button>
    </form>

    <div id="galleryPreview"></div>
  </div>

</div>

<script src="js/admin.js"></script>
</body>
</html>
