<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>School Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <div class="nav-left">
    <h2>School Admin</h2>
  </div>

  <div class="nav-right">
    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('admissions')">Admissions</button>
    <button onclick="showSection('notices')">Notices</button>
    <button onclick="showSection('gallery')">Gallery</button>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- Main -->
<div class="container">

  <!-- Dashboard -->
  <div id="dashboard" class="section">
    <div class="cards">
      <div class="card">
        <h3>Total Admissions</h3>
        <p id="totalAdmissions">0</p>
      </div>
      <div class="card">
        <h3>Total Notices</h3>
        <p id="totalNotices">0</p>
      </div>
      <div class="card">
        <h3>Total Images</h3>
        <p id="totalImages">0</p>
      </div>
    </div>
  </div>

  <!-- Admissions -->
  <div id="admissions" class="section hidden">
  <h2>Admissions</h2>

  <!-- Controls -->
  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search by name or phone">
    <button onclick="exportExcel()">Export Excel</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>S.No</th>
        <th>Name</th>
        <th>Class</th>
        <th>DOB</th>
        <th>Parent</th>
        <th>Phone</th>
        <th>Email</th>
        <th>School</th>
        <th>Message</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="admissionTable"></tbody>
  </table>
</div>

  <!-- Notices -->
  <div id="notices" class="section hidden">
    <h2>Notices</h2>

    <input type="text" id="noticeTitle" placeholder="Enter notice">
    <input type="datetime-local" id="startDate">
    <input type="datetime-local" id="endDate">
    <button onclick="addNotice()">Add</button>

    <ul id="noticeList"></ul>
  </div>

  <!-- Gallery -->
  <div id="gallery" class="section hidden">
    <h3>Upload Image</h3>

<form id="uploadForm">

  <label>Year</label>
  <select id="yearSelect"></select>
  <input type="text" id="newYear" placeholder="Add new year">

  <label>Category</label>
  <select id="categorySelect"></select>
  <input type="text" id="newCategory" placeholder="Add new category">

  <input type="file" id="image" required>

  <button type="submit">Upload</button>
</form>

<div id="galleryPreview"></div>

</div>

<script src="js/admin.js"></script>
</body>
</html>
