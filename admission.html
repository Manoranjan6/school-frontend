<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admission Form</title>

<link rel="stylesheet" href="css/admission.css">
</head>

<body>

<div class="form-container">

  <form id="admissionForm" class="form-card">

    <h2>🎓 Admission Form</h2>

    <!-- Student Name -->
    <div class="input-group">
      <input type="text" id="studentName" required minlength="3">
      <label>Student Name*</label>
    </div>

    <!-- Class -->
    <div class="input-group">
      <select id="classSeeking" required>
        <option value="" disabled selected></option>
        <option>Nursery</option>
        <option>LKG</option>
        <option>UKG</option>
        <option>Class 1</option>
        <option>Class 2</option>
        <option>Class 3</option>
        <option>Class 4</option>
        <option>Class 5</option>
        <option>Class 6</option>
        <option>Class 7</option>
        <option>Class 8</option>
      </select>
      <label>Class Seeking Admission*</label>
    </div>

    <!-- DOB -->
    <div class="input-group">
      <input type="date" id="dob" required>
      <label>Date of Birth*</label>
    </div>

    <!-- Parent -->
    <div class="input-group">
      <input type="text" id="parentName" required minlength="3">
      <label>Parent / Guardian Name*</label>
    </div>

    <!-- Phone -->
    <div class="input-group">
      <input type="tel" id="phone" required pattern="[0-9]{10}">
      <label>Mobile Number*</label>
    </div>

    <!-- Email -->
    <div class="input-group">
      <input type="email" id="email">
      <label>Email (Optional)</label>
    </div>

    <!-- School -->
    <div class="input-group">
      <input type="text" id="presentSchool">
      <label>Present School</label>
    </div>

    <!-- Message -->
    <div class="input-group">
      <textarea id="message"></textarea>
      <label>Message / Query</label>
    </div>

    <!-- Button -->
    <button type="submit" class="submit-btn">
      Submit Application 🚀
    </button>

    <!-- Status -->
    <p id="statusMsg"></p>

  </form>

</div>

<script src="js/admission.js"></script>

</body>
</html>
