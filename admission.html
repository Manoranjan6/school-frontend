<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admission Form</title>

<link rel="stylesheet" href="css/admission.css">
</head>

<body>

<div class="form-container">

  <h2>Admission Form</h2>

  <form id="admissionForm">

    <label>Student Name*</label>
    <input type="text" id="studentName" placeholder="Enter full name" required>

    <label>Class Seeking Admission*</label>
    <select id="classSeeking" required>
      <option value="">Select Class</option>
      <option>Nursery</option>
      <option>LKG</option>
      <option>UKG</option>
      <option>Class 1</option>
      <option>Class 2</option>
      <option>Class 3</option>
      <option>Class 4</option>
<option>Class 5</option>
<option>Class 6</option>
<option>Class 7</option>
<option>Class 8</option>

    </select>

    <label>Date of Birth*</label>
    <input type="date" id="dob" required>

    <label>Parent / Guardian Name*</label>
    <input type="text" id="parentName" required>

    <label>Mobile Number*</label>
    <input type="tel" id="phone" placeholder="10-digit number" required>

    <label>Email (Optional)</label>
    <input type="email" id="email">

    <label>Present School</label>
    <input type="text" id="presentSchool">

    <label>Message / Query</label>
    <textarea id="message"></textarea>

    <button type="submit">Submit Application</button>

    <p id="successMsg" class="success">✅ Submitted Successfully</p>

  </form>

</div>

<script src="js/admission.js"></script>

</body>
</html>
