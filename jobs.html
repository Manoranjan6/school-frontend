<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Careers</title>
  <link rel="stylesheet" href="css/jobs.css">
</head>
<body>

<div class="container">

  <!-- TOP TEXT -->
  <div class="intro">
    <h1>Careers</h1>

    <p class="highlight">
      If you have the passion and flair for teaching and want to contribute to society,
      we provide you the platform to grow and succeed.
    </p>

    <p>
      Fill in the application form and we will contact you when a suitable opportunity arises.
    </p>
  </div>

  <!-- FORM -->
  <div class="form-card">
    <h2>Job Application Form</h2>

    <form>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name" required>
      </div>

      <div class="form-row">
        <div>
          <label>Age</label>
          <input type="number" placeholder="Age">
        </div>

        <div>
          <label>Gender</label>
          <select>
            <option>Select</option>
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Qualification</label>
        <input type="text" placeholder="e.g. B.Ed, M.A, B.Sc">
      </div>

      <div class="form-row">
        <div>
          <label>B.Ed Status</label>
          <select>
            <option>Completed</option>
            <option>Pursuing</option>
          </select>
        </div>

        <div>
          <label>Experience (Years)</label>
          <input type="number" placeholder="e.g. 3">
        </div>
      </div>

      <div class="form-group">
        <label>Currently Working?</label>
        <select>
          <option>Yes</option>
          <option>No</option>
        </select>
      </div>

      <div class="form-group">
        <label>Experience Details</label>
        <textarea rows="3" placeholder="Describe your experience"></textarea>
      </div>

      <div class="form-group">
        <label>Upload Resume (PDF/DOC)</label>
        <input type="file">
      </div>

      <div class="form-group">
        <label>Message (Optional)</label>
        <textarea rows="3" placeholder="Any additional details"></textarea>
      </div>

      <button type="submit">Submit Application</button>

    </form>
  </div>

</div>

<footer>
  <p>© 2026 Indira Wishdom English Medium School</p>
</footer>

</body>
</html>
